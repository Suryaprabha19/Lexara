services:
  - type: web
    name: guvi-doc-analysis
    runtime: python
    buildCommand: apt-get install -y tesseract-ocr && pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
